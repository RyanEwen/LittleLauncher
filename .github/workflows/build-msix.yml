name: Build and Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-2025

    strategy:
      matrix:
        platform: [x64, ARM64]

    env:
      PLATFORM: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Regular build ──────────────────────────────────────────
      - name: Build (dotnet)
        run: dotnet build LittleLauncher/LittleLauncher.csproj -c Release -p:Platform=$env:PLATFORM

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.platform }}
          path: LittleLauncher/bin/${{ matrix.platform }}/Release/net10.0-windows10.0.22000.0/

      # ── MSI build (WiX) ─────────────────────────────────────────
      - name: Build MSI installer
        run: |
          dotnet build LittleLauncherSetup\LittleLauncherSetup.wixproj `
            -p:Platform=$env:PLATFORM `
            -p:Configuration=Release `
            "-p:BuildOutputPath=$env:GITHUB_WORKSPACE\LittleLauncher\bin\$env:PLATFORM\Release\net10.0-windows10.0.22000.0"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSI-${{ matrix.platform }}
          path: LittleLauncherSetup/bin/${{ matrix.platform }}/Release/LittleLauncherSetup.msi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download portable build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Build-*
          path: artifacts/build

      - name: Download MSI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: MSI-*
          path: artifacts/msi

      - name: Collect release files
        run: |
          mkdir -p release
          for dir in artifacts/msi/*/; do
            arch=$(basename "$dir" | sed 's/MSI-//')
            cp "$dir"/*.msi "release/LittleLauncher-${arch}-Setup.msi"
          done
          for dir in artifacts/build/*/; do
            arch=$(basename "$dir" | sed 's/Build-//')
            (cd "$dir" && zip -r "../../../release/LittleLauncher-${arch}-portable.zip" .)
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
