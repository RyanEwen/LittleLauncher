name: Build and Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-2025

    strategy:
      matrix:
        configuration: ["GitHub Release", "Release"]
        platform: [x64, ARM64]

    env:
      SOLUTION_PATH: LittleLauncher.sln
      WAP_PROJECT_PATH: LittleLauncherMSIX\LittleLauncherMSIX.wapproj
      CONFIGURATION: ${{ matrix.configuration }}
      PLATFORM: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── Regular build ──────────────────────────────────────────
      - name: Build (dotnet)
        run: dotnet build LittleLauncher/LittleLauncher.csproj -c Release -p:Platform=$env:PLATFORM

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.configuration == 'GitHub Release' && 'GitHub_Release' || matrix.configuration }}-${{ matrix.platform }}
          path: LittleLauncher/bin/${{ matrix.platform }}/Release/net10.0-windows10.0.22000.0/

      # ── MSIX build ─────────────────────────────────────────────
      - name: Decode signing certificate
        run: |
          $cert = [Convert]::FromBase64String("${{ secrets.MSIX_CERT_BASE64 }}")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", $cert)

      - name: Restore NuGet packages
        run: nuget restore $env:SOLUTION_PATH

      - name: Build & Package (MSIX)
        run: |
          msbuild $env:WAP_PROJECT_PATH `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:UapAppxPackageBuildMode=StoreUpload `
            /p:AppxBundle=Never `
            /p:AppxPackageDir="$env:GITHUB_WORKSPACE\AppxPackages\\" `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile="$env:RUNNER_TEMP\cert.pfx" `
            /p:PackageCertificatePassword="${{ secrets.MSIX_CERT_PASSWORD }}"

      - name: Upload MSIX bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-${{ matrix.configuration == 'GitHub Release' && 'GitHub_Release' || matrix.configuration }}-${{ matrix.platform }}
          path: AppxPackages\*\

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download MSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: MSIX-GitHub_Release-*
          path: artifacts

      - name: Collect MSIX files
        run: |
          mkdir -p release
          find artifacts -name '*.msix' -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.msix
          generate_release_notes: true
